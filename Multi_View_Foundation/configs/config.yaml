# Multi-View Foundation property_regression configuration.
#
# Active workflow:
#   python scripts/step1_property_regression.py --config configs/config.yaml
# The fixed split is train/validation/test = 8/1/1 with data.random_seed=42.

# Shared paths/data used by property_regression.
paths:
  property_dir: "../Data/Property"
  results_dir: "results"

data:
  random_seed: 42

# property_regression args
property:
  files: [
    "Tg.csv",
    "Tm.csv",
    "Td.csv",
    "Eg.csv",
    "Ced.csv",
    "Ea.csv",
    "Eib.csv",
    "In.csv",
  ]
  val_ratio: 0.1             # 10% validation holdout for Optuna HPO
  test_ratio: 0.1            # 10% test holdout for final comparison only
  model_type: "mlp"
  views: ["smiles", "smiles_bpe", "selfies", "group_selfies", "graph"]
  enable_multiview_mean_head: false
  generate_figures: true
  hyperparameter_tuning:
    validation_strategy: "holdout_8_1_1"
    n_trials: 50
    enabled: true
    tuning_epochs: 50
    tuning_patience: 10
    final_training_epochs: 200
    metric: "r2"
    search_space:
      num_layers: [2, 3, 4, 5]
      neurons: [64, 128, 256, 512, 1024]
      learning_rate: [4.0e-4, 6.0e-4, 8.0e-4, 1.0e-3]
      dropout: [0.1, 0.2, 0.3]
      batch_size: [4, 8, 16, 32, 64, 128]
      # finetune_last_layers is always searched as integer range [0, backbone_num_layers].

# Backbone encoder args used by property_regression.
smiles_encoder:
  method_dir: "../Bi_Diffusion_SMILES"
  config_path: "../Bi_Diffusion_SMILES/configs/config.yaml"
  results_dir: ""
  model_size: "small"
  step_dir: "step1_backbone"
  checkpoint_name: "backbone_best.pt"
  tokenizer_path: ""
  checkpoint_path: ""
  pooling: "mean"
  timestep: 1
  batch_size: 256
  device: "auto"

